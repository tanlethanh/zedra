services:
  relay:
    image: zedra-relay:latest
    container_name: zedra-relay
    restart: unless-stopped
    init: true                  # tini as PID 1: proper SIGTERM propagation + zombie reaping
    environment:
      - RELAY_HOSTNAME=${INSTANCE}.relay.zedra.dev
    ports:
      - "80:80"
      - "443:443"
      - "7842:7842/udp"
    volumes:
      - certs:/data/certs
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    sysctls:
      net.core.somaxconn: 4096          # accept backlog (default 128 drops under load)
      net.ipv4.tcp_max_syn_backlog: 4096
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE                # required to bind ports 80 and 443
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9090"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  monitor:
    image: zedra-monitor:latest
    restart: unless-stopped
    init: true
    depends_on:
      relay:
        condition: service_healthy
    ports:
      - "127.0.0.1:9091:9091"    # REST API — relay-check queries via SSH tunnel
    volumes:
      - /proc:/host/proc:ro
      - /:/host/root:ro
      - metrics:/data/metrics
    environment:
      - DISCORD_WEBHOOK
      - INSTANCE
      - MAX_CPU_PCT
      - MAX_LOAD1
      - MAX_MEM_PCT
      - MAX_DISK_PCT
      - POLL_MS
      - SUMMARY_MS
    ulimits:
      nofile:
        soft: 10000
        hard: 10000
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  certs:
    name: zedra-relay-certs   # named so it persists across compose up/down
  metrics:
    name: zedra-relay-metrics
