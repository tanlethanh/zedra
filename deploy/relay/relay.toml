# iroh-relay configuration
# __HOSTNAME__ is substituted at container start by entrypoint.sh from RELAY_HOSTNAME env var

http_bind_addr = "[::]:80"
enable_relay = true
enable_quic_addr_discovery = true
enable_metrics = true
metrics_bind_addr = "127.0.0.1:9090"

[tls]
cert_mode = "LetsEncrypt"
hostname = "__HOSTNAME__"
contact = "admin@zedra.dev"
prod_tls = true
cert_dir = "/data/certs"
