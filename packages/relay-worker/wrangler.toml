name = "zedra-relay"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# Smart Placement: CF analyzes actual traffic patterns and moves the Worker
# to minimize latency to its dependencies (the RelayRoom DO).
# Over time this pins Worker execution to the same PoP as the DO.
[placement]
mode = "smart"

routes = [
  { pattern = "relay.zedra.dev/*", zone_name = "zedra.dev" },
  { pattern = "relay.zedra.dev", custom_domain = true }
]

[durable_objects]
bindings = [
  { name = "ZEDRA_RELAY_ROOM", class_name = "RelayRoom" }
]

[observability.logs]
enabled = true
invocation_logs = true

[observability.traces]
enabled = true

[[migrations]]
tag = "v1"
new_sqlite_classes = ["WsRelay"]

[[migrations]]
tag = "v2"
deleted_classes = ["WsRelay"]
new_sqlite_classes = ["RelayEndpoint"]

[[migrations]]
tag = "v3"
deleted_classes = ["RelayEndpoint"]
new_sqlite_classes = ["RelayRoom"]
