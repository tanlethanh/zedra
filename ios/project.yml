name: Zedra
options:
  minimumXcodeGenVersion: "2.45.0"
  projectFormat: xcode15_3
  xcodeVersion: "26.4"
  bundleIdPrefix: dev.zedra
  deploymentTarget:
    iOS: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    # CocoaPods/Firebase and the Rust FFI wrapper read tools outside their declared inputs.
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    STRING_CATALOG_GENERATE_SYMBOLS: YES

targets:
  Zedra:
    type: application
    platform: iOS
    sources:
      - path: Zedra
        excludes:
          - GoogleService-Info.plist
      - path: Shared
    dependencies:
      - target: ZedraTaskWidget
      - target: ZedraRustFFI
        link: false
      - framework: ZedraFFI.xcframework
        embed: false
      # System frameworks required by GPUI (Metal rendering + CoreText)
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: QuartzCore.framework
      - sdk: CoreFoundation.framework
      - sdk: CoreGraphics.framework
      - sdk: CoreText.framework
      - sdk: UIKit.framework
      - sdk: Security.framework
      - sdk: Network.framework
      - sdk: AVFoundation.framework
    info:
      path: Zedra/Info.plist
      properties:
        NSSupportsLiveActivities: true
        # Firebase default-off: nothing collects until the user is confirmed
        # opted-in at runtime via zedra_set_collection_enabled
        # (telemetry::apply_persisted_optout).
        FIREBASE_ANALYTICS_COLLECTION_ENABLED: false
        FirebaseCrashlyticsCollectionEnabled: false
        CFBundleURLTypes:
          - CFBundleURLSchemes: [zedra]
            CFBundleURLName: dev.zedra.app
    postBuildScripts:
      - name: "Firebase Config"
        script: |
          set -eu

          GOOGLE_SERVICE_PLIST="${SRCROOT}/Zedra/GoogleService-Info.plist"
          APP_BUNDLE="${BUILT_PRODUCTS_DIR}/${WRAPPER_NAME:-${PRODUCT_NAME}.app}"
          DESTINATION="${APP_BUNDLE}/GoogleService-Info.plist"

          if [ -f "$GOOGLE_SERVICE_PLIST" ]; then
            mkdir -p "$APP_BUNDLE"
            cp "$GOOGLE_SERVICE_PLIST" "$DESTINATION"
            exit 0
          fi

          case "${CONFIGURATION:-}" in
            Release*)
              echo "error: Missing $GOOGLE_SERVICE_PLIST. Release builds require Firebase configuration."
              exit 1
              ;;
            *)
              echo "warning: Missing $GOOGLE_SERVICE_PLIST. Firebase is disabled for this debug build."
              ;;
          esac
        basedOnDependencyAnalysis: false
      - name: "Google OAuth URL Scheme"
        script: |
          set -eu

          GOOGLE_SERVICE_PLIST="${SRCROOT}/Zedra/GoogleService-Info.plist"
          APP_INFO_PLIST="${TARGET_BUILD_DIR}/${INFOPLIST_PATH}"

          if [ ! -f "$GOOGLE_SERVICE_PLIST" ]; then
            echo "warning: Missing $GOOGLE_SERVICE_PLIST. Delta Google sign-in is disabled for this build."
            exit 0
          fi

          REVERSED_CLIENT_ID="$(/usr/libexec/PlistBuddy -c 'Print :REVERSED_CLIENT_ID' "$GOOGLE_SERVICE_PLIST" 2>/dev/null || true)"
          if [ -z "$REVERSED_CLIENT_ID" ]; then
            echo "error: Missing REVERSED_CLIENT_ID in $GOOGLE_SERVICE_PLIST."
            exit 1
          fi

          /usr/libexec/PlistBuddy -c "Delete :CFBundleURLTypes" "$APP_INFO_PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes array" "$APP_INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0 dict" "$APP_INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLName string dev.zedra.app" "$APP_INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes array" "$APP_INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes:0 string zedra" "$APP_INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:1 dict" "$APP_INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:1:CFBundleURLName string google" "$APP_INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:1:CFBundleURLSchemes array" "$APP_INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:1:CFBundleURLSchemes:0 string $REVERSED_CLIENT_ID" "$APP_INFO_PLIST"
        basedOnDependencyAnalysis: false
        inputFiles:
          - "$(TARGET_BUILD_DIR)/$(INFOPLIST_PATH)"
          - "$(SRCROOT)/Zedra/GoogleService-Info.plist"
      - name: "Firebase Crashlytics dSYM Upload"
        script: |
          set -eu

          GOOGLE_SERVICE_PLIST="${SRCROOT}/Zedra/GoogleService-Info.plist"

          if [ ! -f "$GOOGLE_SERVICE_PLIST" ]; then
            case "${CONFIGURATION:-}" in
              Release*)
                echo "error: Missing $GOOGLE_SERVICE_PLIST. Release builds require Firebase configuration."
                exit 1
                ;;
              *)
                echo "warning: Skipping Firebase Crashlytics dSYM upload because $GOOGLE_SERVICE_PLIST is missing."
                exit 0
                ;;
            esac
          fi

          "${PODS_ROOT}/FirebaseCrashlytics/run"
        basedOnDependencyAnalysis: false
        inputFiles:
          - "${DWARF_DSYM_FOLDER_PATH}/${DWARF_DSYM_FILE_NAME}"
          - "$(SRCROOT)/$(BUILT_PRODUCTS_DIR)/$(INFOPLIST_PATH)"
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.4"
        CURRENT_PROJECT_VERSION: "12"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: GHV27CNR5U
        CODE_SIGN_ENTITLEMENTS: Zedra/Zedra.entitlements
        INFOPLIST_KEY_CFBundleDisplayName: Zedra
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSCameraUsageDescription: "Zedra needs camera access to scan QR codes for pairing"
        # $(inherited): include CocoaPods linker flags (Firebase etc.)
        # -ObjC: Force-load all ObjC classes/categories from static libs
        # -all_load: Ensure all symbols (including GPUI FFI) are included
        OTHER_LDFLAGS: ["$(inherited)", "-ObjC", "-all_load"]
        CLANG_ENABLE_OBJC_ARC: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEAD_CODE_STRIPPING: YES
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: dev.zedra.app.debug
          INFOPLIST_KEY_CFBundleDisplayName: "Zedra Dev"
          APS_ENVIRONMENT: development
          COPY_PHASE_STRIP: NO
          DEBUG_INFORMATION_FORMAT: dwarf
          ENABLE_TESTABILITY: YES
          GCC_OPTIMIZATION_LEVEL: 0
          MTL_ENABLE_DEBUG_INFO: INCLUDE_SOURCE
          ONLY_ACTIVE_ARCH: YES
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: dev.zedra.app
          APS_ENVIRONMENT: production
          COPY_PHASE_STRIP: YES
          DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
          DEPLOYMENT_POSTPROCESSING: YES
          ENABLE_DEBUG_DYLIB: NO
          ENABLE_NS_ASSERTIONS: NO
          ENABLE_TESTABILITY: NO
          GCC_OPTIMIZATION_LEVEL: s
          MTL_ENABLE_DEBUG_INFO: NO
          SWIFT_COMPILATION_MODE: wholemodule
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          VALIDATE_PRODUCT: YES

  ZedraTaskWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.1"
    sources:
      - path: ZedraTaskWidget
      - path: Shared
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
    info:
      path: ZedraTaskWidget/Info.plist
      properties:
        CFBundleDisplayName: "Zedra Tasks"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: GHV27CNR5U
        SKIP_INSTALL: YES
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: dev.zedra.app.debug.ZedraTaskWidget
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: dev.zedra.app.ZedraTaskWidget

schemes:
  Zedra:
    management:
      shared: true
      orderHint: 0
    build:
      targets:
        Zedra: all
      parallelizeBuild: true
      buildImplicitDependencies: true
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  Zedra Release:
    management:
      shared: true
      orderHint: 1
    build:
      targets:
        Zedra: all
      parallelizeBuild: true
      buildImplicitDependencies: true
    run:
      config: Release
    test:
      config: Release
    profile:
      config: Release
    analyze:
      config: Release
    archive:
      config: Release

aggregateTargets:
  ZedraRustFFI:
    buildScripts:
      - name: "Build Rust FFI"
        script: |
          "${SRCROOT}/../scripts/xcode-build-rust.sh"
        basedOnDependencyAnalysis: false
        outputFiles:
          - "$(SRCROOT)/ZedraFFI.xcframework"
          - "$(SRCROOT)/ZedraFFI.xcframework/Info.plist"
