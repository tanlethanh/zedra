name: Zedra
options:
  minimumXcodeGenVersion: "2.45.0"
  projectFormat: xcode15_3
  bundleIdPrefix: dev.zedra
  deploymentTarget:
    iOS: "16.0"
  generateEmptyDirectories: true

targets:
  Zedra:
    type: application
    platform: iOS
    sources:
      - path: Zedra
    dependencies:
      - target: ZedraRustFFI
        link: false
      - framework: ZedraFFI.xcframework
        embed: false
      # System frameworks required by GPUI (Metal rendering + CoreText)
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: QuartzCore.framework
      - sdk: CoreFoundation.framework
      - sdk: CoreGraphics.framework
      - sdk: CoreText.framework
      - sdk: UIKit.framework
      - sdk: Security.framework
      - sdk: Network.framework
      - sdk: AVFoundation.framework
    info:
      path: Zedra/Info.plist
      properties:
        CFBundleURLTypes:
          - CFBundleURLSchemes: [zedra]
            CFBundleURLName: dev.zedra.app
    postBuildScripts:
      - name: "Firebase Crashlytics dSYM Upload"
        script: "${PODS_ROOT}/FirebaseCrashlytics/run"
        inputFiles:
          - "${DWARF_DSYM_FOLDER_PATH}/${DWARF_DSYM_FILE_NAME}"
          - "$(SRCROOT)/$(BUILT_PRODUCTS_DIR)/$(INFOPLIST_PATH)"
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "4"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: GHV27CNR5U
        INFOPLIST_KEY_CFBundleDisplayName: Zedra
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSCameraUsageDescription: "Zedra needs camera access to scan QR codes for pairing"
        # $(inherited): include CocoaPods linker flags (Firebase etc.)
        # -ObjC: Force-load all ObjC classes/categories from static libs
        # -all_load: Ensure all symbols (including GPUI FFI) are included
        OTHER_LDFLAGS: ["$(inherited)", "-ObjC", "-all_load"]
        CLANG_ENABLE_OBJC_ARC: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEAD_CODE_STRIPPING: YES
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: dev.zedra.app.debug
          INFOPLIST_KEY_CFBundleDisplayName: "Zedra Dev"
          COPY_PHASE_STRIP: NO
          DEBUG_INFORMATION_FORMAT: dwarf
          ENABLE_TESTABILITY: YES
          GCC_OPTIMIZATION_LEVEL: 0
          MTL_ENABLE_DEBUG_INFO: INCLUDE_SOURCE
          ONLY_ACTIVE_ARCH: YES
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: dev.zedra.app
          COPY_PHASE_STRIP: YES
          DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
          DEPLOYMENT_POSTPROCESSING: YES
          ENABLE_DEBUG_DYLIB: NO
          ENABLE_NS_ASSERTIONS: NO
          ENABLE_TESTABILITY: NO
          GCC_OPTIMIZATION_LEVEL: s
          MTL_ENABLE_DEBUG_INFO: NO
          STRIP_INSTALLED_PRODUCT: YES
          STRIP_STYLE: all
          SWIFT_COMPILATION_MODE: wholemodule
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          VALIDATE_PRODUCT: YES

schemes:
  Zedra:
    management:
      shared: true
      orderHint: 0
    build:
      targets:
        Zedra: all
      parallelizeBuild: true
      buildImplicitDependencies: true
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  Zedra Release:
    management:
      shared: true
      orderHint: 1
    build:
      targets:
        Zedra: all
      parallelizeBuild: true
      buildImplicitDependencies: true
    run:
      config: Release
    test:
      config: Release
    profile:
      config: Release
    analyze:
      config: Release
    archive:
      config: Release

aggregateTargets:
  ZedraRustFFI:
    buildScripts:
      - name: "Build Rust FFI"
        script: |
          "${SRCROOT}/../scripts/xcode-build-rust.sh"
        basedOnDependencyAnalysis: false
        outputFiles:
          - "$(SRCROOT)/ZedraFFI.xcframework"
          - "$(SRCROOT)/ZedraFFI.xcframework/Info.plist"
