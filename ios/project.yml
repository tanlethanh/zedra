name: Zedra
options:
  bundleIdPrefix: dev.zedra
  deploymentTarget:
    iOS: "16.0"
  generateEmptyDirectories: true

targets:
  Zedra:
    type: application
    platform: iOS
    sources:
      - path: Zedra
    dependencies:
      - framework: ZedraFFI.xcframework
        embed: false
      # System frameworks required by GPUI (Metal rendering + CoreText)
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: QuartzCore.framework
      - sdk: CoreFoundation.framework
      - sdk: CoreGraphics.framework
      - sdk: CoreText.framework
      - sdk: UIKit.framework
      - sdk: Security.framework
      - sdk: Network.framework
      - sdk: AVFoundation.framework
    info:
      path: Zedra/Info.plist
      properties:
        CFBundleURLTypes:
          - CFBundleURLSchemes: [zedra]
            CFBundleURLName: dev.zedra.app
    postBuildScripts:
      - name: "Firebase Crashlytics dSYM Upload"
        script: "${PODS_ROOT}/FirebaseCrashlytics/run"
        inputFiles:
          - "${DWARF_DSYM_FOLDER_PATH}/${DWARF_DSYM_FILE_NAME}"
          - "$(SRCROOT)/$(BUILT_PRODUCTS_DIR)/$(INFOPLIST_PATH)"
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        PRODUCT_BUNDLE_IDENTIFIER: dev.zedra.app
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: GHV27CNR5U
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSCameraUsageDescription: "Zedra needs camera access to scan QR codes for pairing"
        # $(inherited): include CocoaPods linker flags (Firebase etc.)
        # -ObjC: Force-load all ObjC classes/categories from static libs
        # -all_load: Ensure all symbols (including GPUI FFI) are included
        OTHER_LDFLAGS: ["$(inherited)", "-ObjC", "-all_load"]
        CLANG_ENABLE_OBJC_ARC: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
