# iOS Release — Option A: GitHub Actions + xcodebuild + App Store Connect API key
#
# Triggers:
#   - Push of a v* tag (e.g. v1.0.0)  → archive + upload to TestFlight
#   - Manual dispatch                   → choose upload destination
#
# Required GitHub secrets:
#   ASC_KEY_P8      — contents of the .p8 API key file from App Store Connect
#   ASC_KEY_ID      — 10-character key ID (e.g. ABC1234567)
#   ASC_ISSUER_ID   — UUID from App Store Connect → Users and Access → Keys
#
# How to get the App Store Connect API key:
#   App Store Connect → Users and Access → Integrations → App Store Connect API
#   Create a key with "Developer" role (or "App Manager" for full access).
#   Download the .p8 once — Apple does not let you re-download it.
#
# Xcode version note:
#   macos-15 runners ship with Xcode 16.x. The project currently targets iOS 16.0
#   (matching ios/project.yml). When Xcode 26 becomes available on GitHub-hosted
#   runners, update IPHONEOS_DEPLOYMENT_TARGET and xcode-select path to match.
#   Until then, use Xcode Cloud (see .xcode/cloud/) for Xcode 26 / iOS 26 builds.

name: iOS Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      destination:
        description: "Upload destination after build"
        required: true
        default: "testflight"
        type: choice
        options:
          - testflight
          - skip-upload

permissions:
  contents: read

jobs:
  build-and-upload:
    runs-on: macos-15

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── Rust toolchain ──────────────────────────────────────────────────────
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - uses: Swatinem/rust-cache@v2
        with:
          key: ios-arm64

      # ── Native tools ────────────────────────────────────────────────────────
      # xcodegen generates Zedra.xcodeproj from ios/project.yml.
      # cocoapods runs pod install to produce the Zedra.xcworkspace used by
      # xcodebuild archive. Both must run before the archive step.
      - name: Install xcodegen and CocoaPods
        run: |
          brew install xcodegen
          sudo gem install cocoapods --no-document

      # ── App Store Connect API key ────────────────────────────────────────────
      # xcodebuild reads the key from this well-known location when passed the
      # -authenticationKeyPath / -authenticationKeyID / -authenticationKeyIssuerID
      # flags. This allows automatic provisioning profile management without
      # storing certificates or profiles in the repo.
      - name: Write App Store Connect API key
        env:
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_KEY_P8" > \
            ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

      # ── Build Rust xcframework ───────────────────────────────────────────────
      # Device slice only (--device) — simulator slice is not needed for App Store.
      # --release produces the optimised .a that goes into ZedraFFI.xcframework.
      - name: Build Rust xcframework
        run: ./scripts/build-ios.sh --device --release
        env:
          IPHONEOS_DEPLOYMENT_TARGET: "16.0"

      # ── Generate Xcode project and resolve CocoaPods ─────────────────────────
      - name: Generate Xcode project and run pod install
        run: |
          cd ios
          xcodegen generate
          pod install

      # ── Archive ─────────────────────────────────────────────────────────────
      # -destination "generic/platform=iOS" targets all iOS devices (required for
      # archiving; no specific device UDID needed).
      # -allowProvisioningUpdates lets xcodebuild download/create provisioning
      # profiles on the fly using the API key written above.
      - name: Archive
        run: |
          xcodebuild archive \
            -workspace ios/Zedra.xcworkspace \
            -scheme Zedra \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/Zedra.xcarchive" \
            -authenticationKeyPath \
              "$HOME/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8" \
            -authenticationKeyID "${{ secrets.ASC_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}" \
            -allowProvisioningUpdates \
            IPHONEOS_DEPLOYMENT_TARGET="16.0" \
            -quiet

      # ── Export IPA ──────────────────────────────────────────────────────────
      # ExportOptions.plist (ios/ExportOptions.plist) controls the export method.
      # -authenticationKeyPath flags are repeated here so xcodebuild can re-sign
      # during export if the provisioning profile requires it.
      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Zedra.xcarchive" \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath "$RUNNER_TEMP/export" \
            -authenticationKeyPath \
              "$HOME/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8" \
            -authenticationKeyID "${{ secrets.ASC_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}" \
            -allowProvisioningUpdates

      # ── Save IPA as workflow artifact ────────────────────────────────────────
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Zedra-${{ github.ref_name }}.ipa
          path: ${{ runner.temp }}/export/Zedra.ipa
          retention-days: 30

      # ── Upload to TestFlight ─────────────────────────────────────────────────
      # xcrun altool is deprecated since Xcode 14 but remains the simplest
      # command-line upload path for iOS in pure-shell CI.
      #
      # Modern alternatives (no extra dependencies):
      #   - Replace this step with Fastlane `pilot` (wraps App Store Connect API)
      #   - Or call the App Store Connect REST API directly with curl + the P8 key
      #
      # The API key file must be at the path written in the earlier step.
      - name: Upload to TestFlight
        if: >
          github.event_name == 'push' ||
          inputs.destination == 'testflight'
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/export/Zedra.ipa" \
            --apiKey "${{ secrets.ASC_KEY_ID }}" \
            --apiIssuer "${{ secrets.ASC_ISSUER_ID }}"
