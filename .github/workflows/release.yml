name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
            cross: false
          # - target: x86_64-apple-darwin
          #   runner: macos-14
          #   cross: false
          # Build Linux artifacts on Ubuntu 22.04 so GNU binaries do not inherit
          # ubuntu-latest's newer glibc baseline.
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            cross: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04
            cross: true
          - target: x86_64-pc-windows-msvc
            runner: windows-2022
            cross: false
          - target: aarch64-pc-windows-msvc
            runner: windows-2022
            cross: false

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build
        shell: bash
        env:
          ZEDRA_GA_MEASUREMENT_ID: ${{ secrets.ZEDRA_GA_MEASUREMENT_ID }}
          ZEDRA_GA_API_SECRET: ${{ secrets.ZEDRA_GA_API_SECRET }}
        run: |
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            export RUSTFLAGS="-C target-feature=+crt-static"
          fi

          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build -p zedra-host --release --target ${{ matrix.target }}
          else
            cargo build -p zedra-host --release --target ${{ matrix.target }}
          fi

      - name: Smoke test CLI
        if: ${{ !matrix.cross }}
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          binary="./zedra"
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            binary="./zedra.exe"
          fi

          version_output="$("$binary" --version)"
          if [ -z "$version_output" ]; then
            echo "zedra --version produced no output" >&2
            exit 1
          fi

          "$binary" --help > zedra-help.txt
          grep -q "Commands" zedra-help.txt

      - name: Package
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          binary="zedra"
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            binary="zedra.exe"
          fi
          tar czf zedra-${{ matrix.target }}.tar.gz "$binary"
          shasum -a 256 zedra-${{ matrix.target }}.tar.gz > zedra-${{ matrix.target }}.tar.gz.sha256 || \
            sha256sum zedra-${{ matrix.target }}.tar.gz > zedra-${{ matrix.target }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zedra-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/zedra-${{ matrix.target }}.tar.gz
            target/${{ matrix.target }}/release/zedra-${{ matrix.target }}.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.sha256
