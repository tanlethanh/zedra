name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
            cross: false
          # - target: x86_64-apple-darwin
          #   runner: macos-14
          #   cross: false
          # - target: x86_64-unknown-linux-gnu
          #   runner: ubuntu-latest
          #   cross: false
          # - target: aarch64-unknown-linux-gnu
          #   runner: ubuntu-latest
          #   cross: true

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build -p zedra-host --release --target ${{ matrix.target }}
          else
            cargo build -p zedra-host --release --target ${{ matrix.target }}
          fi

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf zedra-${{ matrix.target }}.tar.gz zedra
          shasum -a 256 zedra-${{ matrix.target }}.tar.gz > zedra-${{ matrix.target }}.tar.gz.sha256 || \
            sha256sum zedra-${{ matrix.target }}.tar.gz > zedra-${{ matrix.target }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zedra-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/zedra-${{ matrix.target }}.tar.gz
            target/${{ matrix.target }}/release/zedra-${{ matrix.target }}.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.sha256
