name: Bug Report
description: Report a reproducible bug or regression
labels: bug
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What broke, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: |
        - Platform:
        - App / CLI version:
        - Device / OS:
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Logs, screenshots, recordings, or crash output.
    validations:
      required: false
