[package]
name = "zedra"
version.workspace = true
edition.workspace = true

[lib]
name = "zedra"
crate-type = ["cdylib"]

[dependencies]
gpui = { path = "../../vendor/zed/crates/gpui", default-features = false }
http_client = { path = "../../vendor/zed/crates/http_client" }
anyhow.workspace = true
log.workspace = true
crossbeam-channel = "0.5"
once_cell = "1.19"

# Syntax highlighting
tree-sitter = "0.26"
tree-sitter-rust = "0.24"

# Workspace crates
zedra-session = { path = "../zedra-session" }
zedra-terminal = { path = "../zedra-terminal" }
zedra-rpc = { path = "../zedra-rpc" }
iroh.workspace = true
rust-embed = { workspace = true, features = ["debug-embed"] }

[target.'cfg(target_os = "android")'.dependencies]
gpui_android = { path = "../../vendor/zed/crates/gpui_android" }
android_logger = "0.15.1"
jni = "0.21.1"
ndk = "0.9"
ndk-context = "0.1"
